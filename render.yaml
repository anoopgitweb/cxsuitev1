services:
  - type: web
    name: intelligence-suite-web
    env: python
    plan: standard
    buildCommand: python3 -m venv .venv && .venv/bin/python -m pip install --upgrade pip setuptools wheel && .venv/bin/python -m pip install -r requirements.txt
    startCommand: .venv/bin/python backend/server.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CX_TOOLKIT_NO_BROWSER
        value: "1"
