services:
  - type: web
    name: intelligence-suite-web
    env: python
    plan: standard
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python backend/server.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CX_TOOLKIT_NO_BROWSER
        value: "1"
